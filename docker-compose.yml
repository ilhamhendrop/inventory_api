services:
  app:
    build:
      context: .
      dockerfile: docker/go/Dockerfile
    container_name: inventory-app
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    memswap_limit: 768m
    environment:
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PORT: ${SERVER_PORT}

      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_TZ: ${DB_TZ}

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASS: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}

      JWT_KEY: ${JWT_KEY}
      JWT_EXP: ${JWT_EXP}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - ${PORT_APP}
    networks:
      - inventory

  db:
    image: mysql:8.4
    container_name: inventory-db
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1g
    memswap_limit: 1.5g
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: >
      mysqld
      --max_connections=200
      --innodb_buffer_pool_size=512M
      --innodb_log_file_size=128M
      --innodb_flush_log_at_trx_commit=1
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - inventory

  redis:
    image: redis:7-alpine
    container_name: inventory-redis
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 256m
    memswap_limit: 512m
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - inventory

  nginx:
    image: nginx:1.25-alpine
    container_name: inventory-nginx
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 128m
    memswap_limit: 256m
    ports:
      - ${PORT_NGINX}
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./doc:/usr/share/nginx/html/docs:ro
    networks:
      - inventory

  phpmyadmin:
    image: phpmyadmin:5-apache
    platform: linux/amd64
    container_name: inventory-phpmyadmin
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 256m
    memswap_limit: 512m
    ports:
      - ${PORT_PHPMYADMIN}
    environment:
      PMA_HOST: db
      PMA_PORT: ${DB_PORT}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inventory

  swagger:
    image: swaggerapi/swagger-ui
    container_name: inventory-swagger
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 128m
    memswap_limit: 256m
    ports:
      - "49173:8080"
    volumes:
      - ./doc/openapi.yaml:/openapi.yaml
    environment:
      SWAGGER_JSON: /openapi.yaml
    networks:
      - inventory

volumes:
  mysqldata:
  redisdata:

networks:
  inventory:
    driver: bridge